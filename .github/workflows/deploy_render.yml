name: Build Celery Image and Deploy to Render

on:
  push:
    branches: [ "feature/celery" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the code from Github
      - uses: actions/checkout@v3

      # Step 2: Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 3: Compile the Image and Push to Hub
      - name: Build and Push Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/clipquery:v2-celery .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/clipquery:v2-celery
        
      - name: Trigger Deploy Render
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

